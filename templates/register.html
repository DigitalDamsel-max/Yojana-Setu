{% extends "base.html" %}
{% block title %}Register — Yojana Setu{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">📝</div>
      <h2>Create Account</h2>
      <p>Join to discover schemes tailored for you</p>
    </div>

    <form method="POST" action="/register">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Choose a strong password" required>
      </div>
      <button type="submit" class="btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login">Login here</a></p>
  </div>
</div>
{% endblock %}
