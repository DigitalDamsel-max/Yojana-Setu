{% extends "base.html" %}
{% block title %}Edit Scheme — Admin{% endblock %}

{% block content %}
<div class="home-content">
  <a href="/admin/add-scheme" class="back-link">← Back to Admin</a>
  <div class="section-eyebrow"><div class="eyebrow-line"></div><span class="eyebrow-text">Admin Panel</span></div>
  <h2 class="section-title">Edit Scheme</h2>

  <div class="info-card" style="max-width:720px;">
    <div class="card-header"><div class="card-header-icon">✏️</div><h3>{{ scheme.scheme_name }}</h3></div>
    <form method="POST" action="/admin/edit/{{ scheme.id }}" class="admin-form">
      <div class="form-row">
        <div class="form-group">
          <label>Scheme Name</label>
          <input type="text" name="scheme_name" value="{{ scheme.scheme_name }}" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select name="category" required>
            {% for cat in ['all','health','agriculture','education','women','housing','employment'] %}
              <option value="{{ cat }}" {% if scheme.category == cat %}selected{% endif %}>{{ cat | capitalize }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" required>{{ scheme.description }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Min Income (₹)</label>
          <input type="number" name="min_income" value="{{ scheme.min_income }}" required>
        </div>
        <div class="form-group">
          <label>Max Income (₹)</label>
          <input type="number" name="max_income" value="{{ scheme.max_income }}" required>
        </div>
        <div class="form-group">
          <label>Official URL</label>
          <input type="url" name="official_url" value="{{ scheme.official_url or '' }}">
        </div>
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn-primary">Save Changes</button>
        <a href="/admin/add-scheme" class="btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
