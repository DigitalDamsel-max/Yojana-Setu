{% extends "base.html" %}
{% block title %}Check Eligibility — Yojana Setu{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <div class="auth-header">
      <div class="auth-icon">✅</div>
      <h2>Check Your Eligibility</h2>
      <p>Answer a few questions to find schemes you qualify for</p>
    </div>

    <form method="POST" action="/check-eligibility">
      <div class="form-group">
        <label for="income">Annual Family Income (₹)</label>
        <input type="number" id="income" name="income" placeholder="e.g. 250000" min="0" required>
        <span class="form-hint">Enter your total yearly household income in rupees</span>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category" name="category" required>
          <option value="" disabled selected>Select your category</option>
          <option value="all">General / All</option>
          <option value="health">Health &amp; Insurance</option>
          <option value="agriculture">Agriculture &amp; Farmers</option>
          <option value="education">Education &amp; Scholarships</option>
          <option value="women">Women &amp; Child Welfare</option>
          <option value="housing">Housing</option>
          <option value="employment">Employment &amp; Skill</option>
        </select>
      </div>

      <button type="submit" class="btn-primary btn-full">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Find My Schemes
      </button>
    </form>
  </div>
</div>
{% endblock %}
